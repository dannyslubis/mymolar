<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Mole Bridge - Pulau Molaritas</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* Setup Container Utama Responsif 16:9 Cross-Platform */
        body {
            display: flex; justify-content: center; align-items: center;     
            height: 100vh; height: 100svh; width: 100vw;
            background-color: #1a1a1a; margin: 0; padding: 0;
            font-family: 'VT323', monospace; color: white;
            touch-action: none; overflow: hidden;        
        }
        #game-container {
            position: relative; width: 100%; height: 100%;
            max-width: calc(100vh * (16 / 9)); max-width: calc(100svh * (16 / 9));
            max-height: calc(100vw * (9 / 16)); aspect-ratio: 16 / 9;
            background-color: #000;
            image-rendering: pixelated; image-rendering: crisp-edges;
            container-type: inline-size;
        }

        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: 100% 100%; background-position: center; background-repeat: no-repeat;
            image-rendering: inherit;
        }

        /* Z-Index 1: Background Canvas */
        #layer-canvas { background-image: url('kanvasmbm.png'); z-index: 1; }
        
        /* Z-Index 2: Dynamic Tools & Fluids */
        #layer-aqua { background-image: url('mbaqua11.png'); z-index: 2; }
        
        /* FIX 2: Posisi pancaran air disesuaikan dengan moncong botol di gambar */
        #water-stream {
            position: absolute; left: 43.5%; top: 23%; width: 0.6%; height: 0%;
            background-color: rgba(180, 230, 255, 0.6); z-index: 2; transition: height 0.1s ease;
        }

        /* Animasi Tuang Zat (Serbuk Jatuh) */
        #powder-stream {
            position: absolute; left: 52%; top: 15%; width: 2%; height: 0%;
            background-color: #ecf0f1; border-radius: 5px; z-index: 2; transition: height 0.3s ease, top 0.3s ease; display: none;
        }

        /* FIX 1: Beaker Fluids sekarang punya lengkungan (border-radius) agar tidak jebol */
        #beaker-fluid-container {
            position: absolute; left: 37.5%; top: 33.33%; width: 31.25%; height: 55.55%;
            z-index: 2; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; overflow: hidden;
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
        }
        #layer-liquid {
            width: 100%; height: 0%; background-color: rgba(180, 230, 255, 0.25);
            transition: height 0.2s ease, background-color 0.5s ease;
        }
        #layer-precipitate {
            width: 100%; height: 0%; background-color: transparent;
            transition: height 0.4s ease, background-color 0.3s ease;
        }
        
        /* FIX 4: Batang Pengaduk selalu nampak dari awal (Z-Index 2) */
        #layer-stir { background-image: url('mbgstir.png'); z-index: 2; display: block; }
        #layer-hand-pour { background-image: url('mbgstir1.png'); z-index: 2; display: none; }

        /* Z-Index 3: Kaca Gelas (Menimpa Cairan dan Pengaduk) */
        #layer-glass { background-image: url('mbglass.png'); z-index: 3; pointer-events: none; }

        /* Z-Index 4 & 5: Antarmuka Key */
        #layer-key { background-image: url('keymbm.png'); z-index: 4; pointer-events: none; }
        #layer-key-add { background-image: url('keymbm1.png'); z-index: 5; pointer-events: none; display: none; }

        /* Layar Teks Digital / HUD */
        #volume-display {
            position: absolute; left: 50%; top: 88.88%; width: 12.5%; height: 11.11%;
            display: flex; justify-content: center; align-items: center; text-align: center;
            color: #dcdde1; font-size: 3.5cqw; z-index: 6; 
        }

        /* Notifikasi Peringatan */
        #alert-msg {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            color: #e74c3c; font-size: 2.8cqw; font-weight: bold; text-shadow: 2px 2px 0 #000;
            opacity: 0; transition: opacity 0.3s ease; z-index: 7; pointer-events: none;
        }

        /* Tombol Transparan */
        .btn-grid { position: absolute; background: transparent; border: none; cursor: pointer; z-index: 10; }

        /* Pop-Ups */
        .popup-layer { display: none; z-index: 20; }
        #popup-molarity { background-image: url('popupmbm.png'); }
        #popup-solubility { background-image: url('mbsolubility.png'); }

        .calc-text {
            position: absolute; height: 11.11%; width: 25%; display: flex; align-items: center; justify-content: center; text-align: center; color: #000; font-size: 3cqw;
        }
        #calc-mol { left: 43.75%; top: 33.33%; } 
        #calc-liter { left: 43.75%; top: 44.44%; }   
        #calc-result { left: 43.75%; top: 55.55%; } 

        /* --- UI ATOMIC LEVEL (mbsolubility) --- */
        #sim-status {
            position: absolute; left: 31.25%; top: 11.11%; width: 25%; height: 11.11%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 4cqw; z-index: 21; text-shadow: 2px 2px 0 #000;
        }
        .part-sprite {
            position: absolute; height: 11.11%; width: 6.25%;
            background-size: contain; background-position: center; background-repeat: no-repeat; z-index: 21;
        }
        .part-text {
            position: absolute; height: 11.11%; width: 18.75%;
            display: flex; align-items: center; justify-content: flex-start;
            color: white; font-size: 3cqw; z-index: 21; padding-left: 1%; text-shadow: 1px 1px 0 #000;
        }

        #ui-sprite-1 { left: 12.5%; top: 88.88%; }
        #ui-text-1 { left: 18.75%; top: 88.88%; }
        #ui-sprite-2 { left: 37.5%; top: 88.88%; }
        #ui-text-2 { left: 43.75%; top: 88.88%; }
        
        /* FIX 5: Tulisan Air dipindah ke m9-n9 (75% - 81.25%) */
        #ui-sprite-air { left: 75%; top: 88.88%; background-image: url('mbparthoh.png'); }
        #ui-text-air { left: 81.25%; top: 88.88%; width: 12.5%; display: flex; align-items: center; justify-content: flex-start; color: white; font-size: 3cqw; z-index: 21; text-shadow: 1px 1px 0 #000;}

        #particle-canvas {
            position: absolute; left: 12.5%; top: 22.22%; width: 75%; height: 55.55%; z-index: 21; overflow: hidden;
        }
        .atom-node {
            position: absolute; background-size: contain; background-position: center; background-repeat: no-repeat; transform-origin: center center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="layer-canvas" class="layer"></div>
    
    <div id="beaker-fluid-container">
        <div id="layer-liquid"></div>
        <div id="layer-precipitate"></div>
    </div>
    
    <div id="water-stream"></div>
    <div id="powder-stream"></div>
    <div id="layer-stir" class="layer"></div>
    <div id="layer-hand-pour" class="layer"></div>
    <div id="layer-aqua" class="layer"></div>
    
    <div id="layer-glass" class="layer"></div>
    <div id="layer-key" class="layer"></div>
    <div id="layer-key-add" class="layer"></div>

    <div id="volume-display">0</div>
    <div id="alert-msg"></div>

    <button id="btn-add-water" class="btn-grid" style="left: 6.25%; top: 33.33%; width: 18.75%; height: 11.11%;" onmousedown="mulaiTuangAir()" onmouseup="hentiTuangAir()" onmouseleave="hentiTuangAir()" ontouchstart="mulaiTuangAir()" ontouchend="hentiTuangAir()"></button>
    
    <button id="btn-add-substance" class="btn-grid" style="left: 6.25%; top: 55.55%; width: 18.75%; height: 11.11%; display: none;" onclick="eksekusiTambahZat()"></button>

    <button class="btn-grid" style="left: 6.25%; top: 77.77%; width: 18.75%; height: 11.11%;" onclick="resetSimulasi()"></button>
    
    <button class="btn-grid" style="left: 75%; top: 33.33%; width: 18.75%; height: 11.11%;" onclick="bukaSolubility()"></button>
    
    <button class="btn-grid" style="left: 75%; top: 77.77%; width: 18.75%; height: 11.11%;" onclick="bukaMolaritas()"></button>

    <div id="popup-molarity" class="layer popup-layer">
        <button class="btn-grid" style="left: 87.5%; top: 22.22%; width: 6.25%; height: 11.11%; z-index: 22;" onclick="tutupMolaritas()"></button>
        <div id="calc-mol" class="calc-text">0,0 mol</div>
        <div id="calc-liter" class="calc-text">0,0 L</div>
        <div id="calc-result" class="calc-text">0,0 M</div>
    </div>

    <div id="popup-solubility" class="layer popup-layer">
        <button class="btn-grid" style="left: 93.75%; top: 0%; width: 6.25%; height: 11.11%; z-index: 22;" onclick="tutupSolubility()"></button>
        
        <div id="sim-status">Larut</div>
        <div id="ui-sprite-1" class="part-sprite"></div>
        <div id="ui-text-1" class="part-text">Na+</div>
        <div id="ui-sprite-2" class="part-sprite"></div>
        <div id="ui-text-2" class="part-text">Cl-</div>
        <div id="ui-sprite-air" class="part-sprite"></div>
        <div id="ui-text-air">Air</div>

        <div id="particle-canvas"></div>
    </div>
</div>

<script>
    // --- STATE MACROSCOPIC ---
    let volumeAir_mL = 0; 
    let zatTelahDituang = false;
    let larutanTelahDiaduk = false;
    let sistemSedangAnimasi = false;
    let tuangAirInterval = null;
    const MOL_TETAP = 1.0; 

    // DOM Refs
    const elAlert = document.getElementById('alert-msg');
    const elAqua = document.getElementById('layer-aqua');
    const elWaterStream = document.getElementById('water-stream');
    const elLiquid = document.getElementById('layer-liquid');
    const elVolumeDisplay = document.getElementById('volume-display');
    const elKeyAdd = document.getElementById('layer-key-add');
    const btnAddSubstance = document.getElementById('btn-add-substance');
    const elHandPour = document.getElementById('layer-hand-pour');
    const elPowder = document.getElementById('powder-stream');
    const elPrecipitate = document.getElementById('layer-precipitate');
    const elStir = document.getElementById('layer-stir');
    const popMolarity = document.getElementById('popup-molarity');
    const popSolubility = document.getElementById('popup-solubility');

    function tampilkanPeringatan(teks) {
        elAlert.innerText = teks;
        elAlert.style.opacity = '1';
        setTimeout(() => elAlert.style.opacity = '0', 2500);
    }

    function updateVisualBotolMiring() {
        if (volumeAir_mL < 500) {
            elAqua.style.backgroundImage = "url('mbaqua11x.png')";
        } else if (volumeAir_mL >= 500 && volumeAir_mL < 1000) {
            elAqua.style.backgroundImage = "url('mbaqua01x.png')";
        }
    }

    function updateVisualBotolDiam() {
        if (volumeAir_mL === 0) {
            elAqua.style.backgroundImage = "url('mbaqua11.png')";
        } else if (volumeAir_mL > 0 && volumeAir_mL <= 500) {
            elAqua.style.backgroundImage = "url('mbaqua01.png')"; // Di 500 botol 1 habis
        } else if (volumeAir_mL > 500 && volumeAir_mL < 1000) {
            elAqua.style.backgroundImage = "url('mbaqua01.png')"; 
        } else if (volumeAir_mL >= 1000) {
            elAqua.style.backgroundImage = "url('mbaqua00.png')";
        }
    }

    // --- FIX 3: ANIMASI MENUANG AIR PER 100mL ---
    function prosesTuang100mL() {
        if (volumeAir_mL >= 1000) {
            hentiTuangAir();
            return;
        }
        
        volumeAir_mL += 100; // Penambahan pas 100ml / 0,1 L
        updateVisualBotolMiring();

        let persenTinggi = (volumeAir_mL / 1000) * 100;
        elLiquid.style.height = persenTinggi + '%';
        
        let liter = volumeAir_mL / 1000;
        elVolumeDisplay.innerText = liter === 0 ? "0" : liter.toFixed(1).replace('.', ',');

        if (volumeAir_mL >= 100 && !zatTelahDituang) {
            elKeyAdd.style.display = 'block';
            btnAddSubstance.style.display = 'block';
        }
    }

    function mulaiTuangAir() {
        if (sistemSedangAnimasi || volumeAir_mL >= 1000) return;
        elWaterStream.style.height = '35%'; // Memanjang ke gelas
        
        // Panggil langsung sekali saat diklik
        prosesTuang100mL();
        
        // Looping jika ditahan (Jeda agak lambat agar murid melihat per-100ml)
        tuangAirInterval = setInterval(() => {
            prosesTuang100mL();
        }, 400); 
    }

    function hentiTuangAir() {
        clearInterval(tuangAirInterval);
        elWaterStream.style.height = '0%';
        updateVisualBotolDiam();
    }

    // --- FIX 4: LOGIKA MENUANG ZAT & PENGADUKAN ---
    function eksekusiTambahZat() {
        if (sistemSedangAnimasi || zatTelahDituang) return;
        sistemSedangAnimasi = true;

        elKeyAdd.style.display = 'none';
        btnAddSubstance.style.display = 'none';

        // Munculkan Tangan penuang serbuk selama 2 detik
        elHandPour.style.display = 'block';
        elPowder.style.display = 'block';
        elPowder.style.height = '25%'; 
        
        setTimeout(() => {
            elPowder.style.display = 'none';
            elPowder.style.height = '0%';
            elPrecipitate.style.height = '12%'; 
            elPrecipitate.style.backgroundColor = '#ecf0f1';
        }, 1000);

        setTimeout(() => {
            elHandPour.style.display = 'none';
            // Lanjut animasi rotasi batang kaca yang sudah ada
            animasiPengadukan();
        }, 2000);
    }

    function animasiPengadukan() {
        let stirCount = 0;
        let stirInterval = setInterval(() => {
            // Efek bergetar/berputar untuk simulasi pengadukan
            elStir.style.transform = stirCount % 2 === 0 ? 'translateX(3px) rotate(3deg)' : 'translateX(-3px) rotate(-3deg)';
            stirCount++;
            if (stirCount > 15) { // Berlangsung 2 detikan
                clearInterval(stirInterval);
                elStir.style.transform = 'none'; // Kembali diam (mbgstir.png)
                
                zatTelahDituang = true;
                larutanTelahDiaduk = true;
                elPrecipitate.style.height = '0%';
                elLiquid.style.backgroundColor = 'rgba(230, 245, 255, 0.5)'; 
                sistemSedangAnimasi = false;
            }
        }, 150);
    }

    function resetSimulasi() {
        if (sistemSedangAnimasi) return;
        volumeAir_mL = 0;
        zatTelahDituang = false;
        larutanTelahDiaduk = false;
        
        elVolumeDisplay.innerText = "0";
        elLiquid.style.height = '0%';
        elLiquid.style.backgroundColor = 'rgba(180, 230, 255, 0.25)';
        elPrecipitate.style.height = '0%';
        
        updateVisualBotolDiam(); 
        
        elKeyAdd.style.display = 'none';
        btnAddSubstance.style.display = 'none';
        
        tutupMolaritas();
        tutupSolubility();
    }

    function bukaMolaritas() {
        if (volumeAir_mL === 0) {
            tampilkanPeringatan("TAMBAHKAN AIR TERLEBIH DAHULU!");
            return;
        }
        
        let volLiters = volumeAir_mL / 1000;
        let hasilM = larutanTelahDiaduk ? (MOL_TETAP / volLiters) : 0;
        
        document.getElementById('calc-mol').innerText = "1,0 mol";
        let txtL = volLiters === 1 ? "1,0" : volLiters.toFixed(1).replace('.', ',');
        document.getElementById('calc-liter').innerText = txtL + " L";
        document.getElementById('calc-result').innerText = hasilM.toFixed(3).replace('.', ',') + " M";
        
        popMolarity.style.display = 'block';
    }
    function tutupMolaritas() { popMolarity.style.display = 'none'; }


    // ==========================================
    // --- ENGINE FISIKA PARTIKEL (SOLUBILITY) ---
    // ==========================================
    
    let zatAktif = {
        id: 'nacl', larut: true,
        ion1: { sprite: 'mbpartna.png', text: 'Na+', charge: 1 },
        ion2: { sprite: 'mbpartcl.png', text: 'Cl-', charge: -1 }
    };
    
    let particles = [];
    let animFrameId = null;
    const pCanvas = document.getElementById('particle-canvas');

    function bukaSolubility() { 
        if (volumeAir_mL === 0) {
            tampilkanPeringatan("TAMBAHKAN AIR TERLEBIH DAHULU!");
            return;
        }
        popSolubility.style.display = 'block'; 
        setupUISolubility();
        mulaiEnginePartikel();
    }
    
    function tutupSolubility() { 
        popSolubility.style.display = 'none'; 
        if (animFrameId) cancelAnimationFrame(animFrameId);
        pCanvas.innerHTML = '';
        particles = [];
    }

    function setupUISolubility() {
        const isLarut = larutanTelahDiaduk && zatAktif.larut;
        document.getElementById('sim-status').innerText = isLarut ? "Larut" : "Tidak larut";
        document.getElementById('ui-sprite-1').style.backgroundImage = `url('${zatAktif.ion1.sprite}')`;
        document.getElementById('ui-text-1').innerText = zatAktif.ion1.text;
        
        if (zatAktif.ion2) {
            document.getElementById('ui-sprite-2').style.backgroundImage = `url('${zatAktif.ion2.sprite}')`;
            document.getElementById('ui-text-2').innerText = zatAktif.ion2.text;
            document.getElementById('ui-sprite-2').style.display = 'block';
            document.getElementById('ui-text-2').style.display = 'flex';
        } else {
            document.getElementById('ui-sprite-2').style.display = 'none';
            document.getElementById('ui-text-2').style.display = 'none';
        }
    }

    class Partikel {
        constructor(type, x, y, size, sprite, charge) {
            this.type = type; 
            this.x = x; this.y = y;
            // FIX 5: Pergerakan di perlambat
            this.vx = (Math.random() - 0.5) * 0.7; 
            this.vy = (Math.random() - 0.5) * 0.7;
            this.size = size; this.charge = charge; 
            this.angle = Math.random() * 360; 
            
            this.element = document.createElement('div');
            this.element.className = 'atom-node';
            this.element.style.width = size + 'px';
            this.element.style.height = size + 'px';
            this.element.style.backgroundImage = `url('${sprite}')`;
            pCanvas.appendChild(this.element);
        }

        update(canvasWidth, canvasHeight) {
            this.x += this.vx; this.y += this.vy;

            if (this.x <= 0 || this.x + this.size >= canvasWidth) this.vx *= -1;
            if (this.y <= 0 || this.y + this.size >= canvasHeight) this.vy *= -1;

            if (this.type === 'water') {
                let ionTerdekat = null;
                let jarakTerdekat = 99999;

                for (let p of particles) {
                    if (p.type === 'ion1' || p.type === 'ion2') {
                        let dx = p.x - this.x; let dy = p.y - this.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        // Jarak sensor air untuk mengerubungi ion (120px)
                        if (dist < 120 && dist < jarakTerdekat) { 
                            jarakTerdekat = dist; ionTerdekat = p;
                        }
                    }
                }

                if (ionTerdekat) {
                    let targetRad = Math.atan2(ionTerdekat.y - this.y, ionTerdekat.x - this.x);
                    let targetDeg = targetRad * (180 / Math.PI);
                    
                    // Arahkan kutub air ke ion (Orientasi rotasi sprite)
                    if (ionTerdekat.charge === 1) this.angle = targetDeg + 90; 
                    else if (ionTerdekat.charge === -1) this.angle = targetDeg - 90;

                    // FIX 5: Logika pengerubungan (Mendekat jika jauh, stabil jika dekat)
                    if (jarakTerdekat > 35) {
                        this.vx += Math.cos(targetRad) * 0.05;
                        this.vy += Math.sin(targetRad) * 0.05;
                    } else {
                        this.vx -= Math.cos(targetRad) * 0.05;
                        this.vy -= Math.sin(targetRad) * 0.05;
                    }
                    
                    // Damping agar molekul air tidak melesat kencang saat mengitari ion
                    this.vx *= 0.9;
                    this.vy *= 0.9;

                } else {
                    this.angle += 0.5; // Berputar santai jika tidak ada ion
                }
            }
            this.element.style.left = this.x + 'px';
            this.element.style.top = this.y + 'px';
            this.element.style.transform = `rotate(${this.angle}deg)`;
        }
    }

    function mulaiEnginePartikel() {
        pCanvas.innerHTML = ''; particles = [];
        let cWidth = pCanvas.clientWidth; let cHeight = pCanvas.clientHeight;
        let isLarut = larutanTelahDiaduk && zatAktif.larut;

        let volLiters = volumeAir_mL / 1000;
        let molaritas = isLarut ? (MOL_TETAP / volLiters) : 0;
        let baseWaterCount = 25; 
        let ionPairs = isLarut ? Math.min(Math.round(molaritas * 5), 25) : 0;

        for (let i = 0; i < baseWaterCount; i++) {
            particles.push(new Partikel('water', Math.random() * (cWidth - 30), Math.random() * (cHeight - 30), 35, 'mbparthoh.png', 0));
        }

        if (isLarut && ionPairs > 0) {
            for (let i = 0; i < ionPairs; i++) {
                particles.push(new Partikel('ion1', Math.random() * cWidth, Math.random() * cHeight, 30, zatAktif.ion1.sprite, zatAktif.ion1.charge));
                particles.push(new Partikel('ion2', Math.random() * cWidth, Math.random() * cHeight, 30, zatAktif.ion2.sprite, zatAktif.ion2.charge));
            }
        } else if (!larutanTelahDiaduk && zatTelahDituang) {
            let startX = cWidth / 2 - 60; let startY = cHeight - 90;
            let rows = 3; let cols = 4; let spacing = 28;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let px = startX + (c * spacing); let py = startY + (r * spacing);
                    if (zatAktif.ion2) {
                        let sprite = (r + c) % 2 === 0 ? zatAktif.ion1.sprite : zatAktif.ion2.sprite;
                        let p = new Partikel('solid', px, py, 30, sprite, 0);
                        p.vx = 0; p.vy = 0; particles.push(p);
                    } else {
                        let p = new Partikel('solid', px, py, 30, zatAktif.ion1.sprite, 0);
                        p.vx = 0; p.vy = 0; particles.push(p);
                    }
                }
            }
        }
        loopPartikel();
    }

    function loopPartikel() {
        let cWidth = pCanvas.clientWidth; let cHeight = pCanvas.clientHeight;
        for (let p of particles) { p.update(cWidth, cHeight); }
        animFrameId = requestAnimationFrame(loopPartikel);
    }
</script>
</body>
</html>
